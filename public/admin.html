<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administraci&oacute;n de usuarios - Medihelp</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/loader.css">
</head>
<body>
  <script src="js/page-loader.js"></script>

  <header class="header">
    <div class="header-content">
      <a href="index.html" class="logo">
        <img src="assets/descarga.png" alt="Medihelp" class="logo-img">
      </a>
      <div class="header-center">
        <h2>Administraci&oacute;n de usuarios</h2>
      </div>
      <div class="header-right" style="display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;">
        <a href="doctor.html" class="btn-header">Panel cl&iacute;nico</a>
        <button type="button" class="btn-header" id="btnAdminLogout" title="Cerrar sesi&oacute;n">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Salir
        </button>
        <a href="index.html" class="btn-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Inicio
        </a>
      </div>
    </div>
    <div class="header-accent"></div>
  </header>

  <main class="doctor-main admin-main">
    <section class="doctor-section">
      <div class="section-card">
        <div class="admin-toolbar">
          <div>
            <h2 class="admin-title">Usuarios del sistema</h2>
            <p class="admin-subtitle">Registrar, eliminar o restablecer contrase&ntilde;as (solo especialidad <strong>admin</strong>).</p>
          </div>
          <button type="button" class="btn btn-primary" id="btnOpenCreateUser">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
            Registrar usuario
          </button>
        </div>

        <div class="admin-table-wrap">
          <table class="admin-users-table" id="usersTable">
            <thead>
              <tr>
                <th>Usuario</th>
                <th>Documento</th>
                <th>Nombres</th>
                <th>Apellidos</th>
                <th>RM</th>
                <th>Especialidad</th>
                <th class="admin-th-actions">Acciones</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
              <tr><td colspan="7" class="admin-loading">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <!-- Modal crear usuario -->
  <div class="modal-overlay" id="createUserModal">
    <div class="modal admin-modal-wide">
      <h3>Registrar usuario</h3>
      <form id="createUserForm" class="admin-form-grid">
        <div class="field-group">
          <label for="cuUsername">Usuario (login) *</label>
          <input type="text" id="cuUsername" required autocomplete="off" autocapitalize="none">
        </div>
        <div class="field-group">
          <label for="cuPassword">Contrase&ntilde;a *</label>
          <input type="password" id="cuPassword" required minlength="4" autocomplete="new-password">
        </div>
        <div class="field-group">
          <label for="cuTipoDoc">Tipo documento</label>
          <select id="cuTipoDoc">
            <option value="">�</option>
            <option value="CC">CC</option>
            <option value="TI">TI</option>
            <option value="CE">CE</option>
            <option value="PA">PA</option>
            <option value="RC">RC</option>
            <option value="DE">DE</option>
          </select>
        </div>
        <div class="field-group">
          <label for="cuNumDoc">N&uacute;mero documento</label>
          <input type="text" id="cuNumDoc" autocomplete="off">
        </div>
        <div class="field-group">
          <label for="cuNombres">Nombres</label>
          <input type="text" id="cuNombres" autocomplete="off">
        </div>
        <div class="field-group">
          <label for="cuApellidos">Apellidos</label>
          <input type="text" id="cuApellidos" autocomplete="off">
        </div>
        <div class="field-group">
          <label for="cuRM">Registro m&eacute;dico</label>
          <input type="text" id="cuRM" autocomplete="off">
        </div>
        <div class="field-group">
          <label for="cuEsp">Especialidad</label>
          <input type="text" id="cuEsp" placeholder="Ej: Anestesia, admin" autocomplete="off">
        </div>
        <div class="modal-actions admin-modal-actions">
          <button type="button" class="btn btn-outline" id="btnCancelCreate">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal restablecer contrase�a -->
  <div class="modal-overlay" id="resetPassModal">
    <div class="modal">
      <h3>Restablecer contrase&ntilde;a</h3>
      <p>Usuario: <strong id="resetPassUserLabel"></strong></p>
      <input type="hidden" id="resetPassUsername">
      <div class="field-group">
        <label for="resetPassNew">Nueva contrase&ntilde;a</label>
        <input type="password" id="resetPassNew" minlength="4" required autocomplete="new-password">
      </div>
      <div class="field-group">
        <label for="resetPassNew2">Confirmar</label>
        <input type="password" id="resetPassNew2" minlength="4" required autocomplete="new-password">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="btnCancelReset">Cancelar</button>
        <button type="button" class="btn btn-primary" id="btnConfirmReset">Guardar</button>
      </div>
    </div>
  </div>

  <div class="toast-container"></div>

  <script src="js/config.js?v=20260409a"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const r = await fetch('/api/auth/me', { credentials: 'include' });
        if (!r.ok) {
          window.location.replace('doctor-login.html');
          return;
        }
        const data = await r.json();
        const esp = String(data.user?.especialidad || '').trim().toLowerCase();
        if (esp !== 'admin') {
          window.location.replace('doctor.html');
          return;
        }
      } catch {
        window.location.replace('doctor-login.html');
        return;
      }
      document.getElementById('btnAdminLogout')?.addEventListener('click', async () => {
        try {
          await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
        } catch (_) {}
        window.location.replace('doctor-login.html');
      });
      initAdminPanel();
    });
  </script>
</body>
</html>
