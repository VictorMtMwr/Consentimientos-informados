<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Consentimiento</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/viewer.css">
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-content">
      <a href="index.html" class="logo">
        <img src="assets/descarga.png" alt="Medihelp" class="logo-img">
      </a>
      <div class="header-center">
        <h2>Formulario de Consentimiento Informado</h2>
      </div>
      <div class="header-right">
        <button class="btn-lang" id="langToggle" type="button">EN</button>
        <a href="paciente.html" class="btn-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Volver
        </a>
      </div>
    </div>
    <div class="header-accent"></div>
  </header>

  <!-- TOOLBAR -->
  <div class="viewer-toolbar">
    <button class="btn btn-outline" id="btnBack" type="button">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Volver
    </button>
    <div class="doc-title" id="docTitle">Cargando...</div>
    <span class="doc-badge card-type" id="docBadge">---</span>
  </div>

  <!-- MAIN FORM -->
  <main class="form-main">
    <div class="form-container" id="formContainer">
      <div class="loading" id="formLoading">
        <div class="spinner"></div>
        <p>Cargando formulario...</p>
      </div>
    </div>
  </main>

  <!-- ALREADY SIGNED BANNER -->
  <div class="signed-banner" id="signedBanner" style="display:none;">
    <div class="signed-banner-content">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
      <div>
        <strong>Este consentimiento ya fue firmado</strong>
        <span id="signedDate">---</span>
      </div>
    </div>
    <div class="signed-banner-actions">
      <a href="#" class="btn btn-primary btn-sm" id="btnViewSigned" target="_blank" style="display:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Ver PDF firmado
      </a>
      <button class="btn btn-outline btn-sm" id="btnBackFromSigned" type="button">Volver a la lista</button>
    </div>
  </div>

  <!-- CONFIRMATION MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="icon" style="color: var(--primary);">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/><path d="M9 15l2 2 4-4"/>
        </svg>
      </div>
      <h3>Confirmar firma del consentimiento</h3>
      <p>
        Se generará un PDF con el formulario completado y su firma.<br><br>
        <strong>Documento:</strong><br><span id="modalDocName">---</span><br><br>
        <strong>Paciente:</strong> <span id="modalSignerName">---</span><br>
        <strong>Cédula:</strong> <span id="modalSignerDoc">---</span>
      </p>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-success" onclick="confirmSignature()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Confirmar y generar PDF
        </button>
      </div>
    </div>
  </div>

  <div class="toast-container"></div>

  <script src="js/forms/forms-es.js"></script>
  <script src="js/forms/forms-en.js"></script>
  <script src="js/forms/ui-strings.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/viewer.js"></script>
  <script src="js/signature.js"></script>
  <script>document.addEventListener('DOMContentLoaded', initViewer);</script>
</body>
</html>
