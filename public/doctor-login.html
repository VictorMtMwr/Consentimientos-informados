<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso m&eacute;dico - Consentimientos Informados</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/loader.css">
</head>
<body>
  <script src="js/page-loader.js"></script>

  <div class="landing login-page">
    <div class="landing-bg">
      <div class="landing-circle c1"></div>
      <div class="landing-circle c2"></div>
      <div class="landing-circle c3"></div>
    </div>

    <div class="landing-content">
      <div class="landing-header">
        <img src="assets/descarga.png" alt="Medihelp Services" class="landing-logo-img">
        <h1>Panel del m&eacute;dico</h1>
        <p>Ingrese sus credenciales para continuar</p>
      </div>

      <div class="login-card doctor-card" style="position: relative;">
        <div style="position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #00838f, #4db6ac); border-radius: var(--radius) var(--radius) 0 0;"></div>
        <h2>Iniciar sesi&oacute;n</h2>
        <p class="login-lead">Usuario y contrase&ntilde;a registrados en el sistema</p>

        <div id="loginError" class="login-error" role="alert"></div>

        <form id="loginForm" class="login-form" autocomplete="on">
          <div>
            <label for="loginUser">Usuario</label>
            <input type="text" id="loginUser" name="username" required autocomplete="username" autocapitalize="none">
          </div>
          <div>
            <label for="loginPass">Contrase&ntilde;a</label>
            <input type="password" id="loginPass" name="password" required autocomplete="current-password">
          </div>
          <div class="login-actions">
            <button type="submit" class="btn btn-primary btn-lg" id="btnLogin">
              Entrar al panel
            </button>
          </div>
        </form>
      </div>

      <div style="text-align: center;">
        <a href="index.html" class="login-back">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Volver al inicio
        </a>
      </div>
    </div>
  </div>

  <script src="js/doctor-login.js" charset="utf-8"></script>
</body>
</html>
